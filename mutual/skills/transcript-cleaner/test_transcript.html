<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘小排 · AI编程分享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #F8F5F0 0%, #E8E0D5 100%);
            min-height: 100vh;
            display: flex;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #8B6B4C 0%, #6B4F38 100%);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        }

        .sidebar h1 {
            color: #F8F5F0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.4;
        }

        .nav-button {
            background: rgba(248, 245, 240, 0.1);
            border: 1px solid rgba(248, 245, 240, 0.2);
            color: #F8F5F0;
            padding: 18px 24px;
            margin-bottom: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .nav-button:hover {
            background: rgba(248, 245, 240, 0.2);
            transform: translateX(5px);
        }

        .nav-button.active {
            background: #F8F5F0;
            color: #8B6B4C;
            box-shadow: 0 4px 15px rgba(139, 107, 76, 0.3);
        }

        /* 右侧内容区 */
        .content {
            margin-left: 280px;
            padding: 60px 80px;
            flex: 1;
        }

        .content-title {
            font-size: 36px;
            font-weight: 700;
            color: #8B6B4C;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        /* 玻璃拟态卡片 */
        .card {
            background: rgba(248, 245, 240, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 181, 158, 0.3);
            border-radius: 20px;
            padding: 30px 40px;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateX(-30px);
            box-shadow: 0 8px 32px rgba(139, 107, 76, 0.1);
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: #8B6B4C;
            margin-bottom: 16px;
            padding-left: 20px;
            position: relative;
        }

        .card-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #8B6B4C;
            border-radius: 50%;
        }

        .card-content {
            color: #5A4A3A;
            line-height: 1.8;
            margin-left: 28px;
            margin-bottom: 16px;
        }

        .card-content ul {
            list-style: none;
            padding-left: 0;
        }

        .card-content li {
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
        }

        .card-content li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 16px;
            width: 6px;
            height: 6px;
            background: #D4B59E;
            border-radius: 50%;
        }

        /* 树根连接线 */
        .tree-line {
            position: absolute;
            left: 280px;
            top: 0;
            width: 3px;
            height: 0;
            background: linear-gradient(180deg, #8B6B4C 0%, #D4B59E 100%);
            transition: height 0.5s ease;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes growTree {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card.animate {
            animation: growTree 0.6s ease forwards;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 240px;
            }

            .content {
                margin-left: 240px;
                padding: 40px 50px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
                padding: 30px 15px;
            }

            .content {
                margin-left: 200px;
                padding: 30px 20px;
            }

            .content-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>刘小排 · AI编程分享</h1>
        <button class="nav-button active" data-section="dao">道（底层认知）</button>
        <button class="nav-button" data-section="fa">法（方法论）</button>
        <button class="nav-button" data-section="shu">术（具体执行）</button>
        <button class="nav-button" data-section="qi">器（工具资源）</button>
    </div>

    <div class="content">
        <h2 class="content-title" id="section-title">道（底层认知，跨场景复用）</h2>
        <div class="cards-container" id="cards-container">
            <!-- 卡片内容将通过JavaScript动态生成 -->
        </div>
    </div>

    <div class="tree-line" id="tree-line"></div>

    <script>
        const data = {"title": "刘小排 · AI编程分享", "dao": [{"title": "核心认知1", "content": ["老师，您说管理能力是核心，能详细说说怎么管理AI吗？", "这是跨场景适用的底层逻辑，理解后可迁移到其他领域"], "subitems": []}], "fa": [{"title": "核心认知2", "content": ["最后我想说，AI编程的本质不是写代码，是管人。", "这是跨场景适用的底层逻辑，理解后可迁移到其他领域"], "subitems": []}, {"title": "方法论1", "content": ["L1是玩具，做demo不能商用；L2是工具，解决具体问题但需要人工操作；L3是副驾，辅助决策需要人在旁边；L4是命令行，执行指令但需要明确指令；L5是实习生，独立完成任务需要检查；L6是全职员工，可以7×24运行。", "→ 这是一个可迁移的框架，适用于类似场景"], "subitems": []}, {"title": "方法论2", "content": ["第一步，写岗位说明书，不要给AI模糊概念，先把需求想清楚，写成人类员工的岗位说明书。", "→ 这是一个可迁移的框架，适用于类似场景"], "subitems": []}], "shu": [], "qi": [{"title": "方法论3", "content": ["第二步，坐旁边看它干一遍，指出错误。", "→ 这是一个可迁移的框架，适用于类似场景"], "subitems": ["执行点1:第一步，写岗位说明书，不要给AI模糊概念，先把需求想清楚，写成人类员工的岗位说明书。", "执行点2:第二步，坐旁边看它干一遍，指出错误。", "执行点3:第三步，再来一遍，重复3-5遍直到稳定。", "执行点4: 最后我想说，AI编程的本质不是写代码，是管人。"]}, {"title": "核心工具组合", "content": ["--", "## 第三部分：我的收获与行动", "### 核心收获", "1. 快不等于自动化，自动化才是终局。", "2.  最后我想说，AI编程的本质不是写代码，是管人。", "3. 第四步，设置检查点，关键环节设置人工检查避免翻车。", "### 立即行动", "[ ] **整理核心观点** - 今天完成", "[ ] **制定行动计划** - 明天完成", "[ ] **实践应用** - 本周内完成", "### 需要深入研究", "文中提到的具体方法论细节", "与自己现有工作的结合点", "--", "## 金句摘录", "> \"快不等于自动化，自动化才是终局。\"", "> \"第四步，设置检查点，关键环节设置人工检查避免翻车。\"", "> \" 老师，您说管理能力是核心，能详细说说怎么管理AI吗？\""], "subitems": ["AI:AI辅助工具，提升效率", "Cursor:AI辅助工具，提升效率", "Codex:AI辅助工具，提升效率"]}]};

        const cardsContainer = document.getElementById('cards-container');
        const sectionTitle = document.getElementById('section-title');
        const treeLine = document.getElementById('tree-line');
        const navButtons = document.querySelectorAll('.nav-button');

        const sectionNames = {
            'dao': '道（底层认知，跨场景复用）',
            'fa': '法（方法论框架，可迁移）',
            'shu': '术（具体执行，可直接上手）',
            'qi': '器（工具与资源）'
        };

        function renderCards(section) {
            cardsContainer.innerHTML = '';
            const items = data[section];

            if (items.length === 0) {
                cardsContainer.innerHTML = '<div class="card"><p>暂无内容</p></div>';
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.15}s`;

                let contentHtml = `<div class="card-title">${item.title}</div>`;

                if (item.content && item.content.length > 0) {
                    contentHtml += '<div class="card-content"><ul>';
                    item.content.forEach(c => {
                        contentHtml += `<li>${c}</li>`;
                    });
                    contentHtml += '</ul></div>';
                }

                if (item.subitems && item.subitems.length > 0) {
                    contentHtml += '<div class="card-content"><ul>';
                    item.subitems.forEach(s => {
                        contentHtml += `<li>${s}</li>`;
                    });
                    contentHtml += '</ul></div>';
                }

                card.innerHTML = contentHtml;
                cardsContainer.appendChild(card);

                // 触发动画
                setTimeout(() => {
                    card.classList.add('animate');
                }, 50 + index * 150);
            });
        }

        function switchSection(section) {
            // 更新标题
            sectionTitle.textContent = sectionNames[section];

            // 更新按钮状态
            navButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.section === section) {
                    btn.classList.add('active');
                }
            });

            // 重置树根线
            treeLine.style.height = '0';

            // 渲染卡片
            renderCards(section);

            // 设置树根线高度
            setTimeout(() => {
                const containerHeight = cardsContainer.offsetHeight;
                treeLine.style.height = `${containerHeight}px`;
            }, 100);
        }

        // 绑定按钮事件
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                switchSection(btn.dataset.section);
            });
        });

        // 初始化
        switchSection('dao');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C盘文件组成 - 可视化报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--muted:#9ca3af;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;--orange:#f97316;--pink:#ec4899}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .meta{font-size:13px;color:var(--muted)}
.disk-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;background:#1e2030;margin:0 32px;margin-top:16px;position:relative}
.disk-bar .seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;transition:all .3s;cursor:pointer;position:relative;min-width:2px}
.disk-bar .seg:hover{filter:brightness(1.3);z-index:2}
.disk-bar .seg .tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#2a2d3a;color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;white-space:nowrap;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.disk-bar .seg:hover .tooltip{display:block}
.legend{display:flex;gap:24px;padding:12px 32px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.controls{padding:0 32px;margin:12px 0;display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s}
.btn:hover,.btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.treemap-container{padding:0 32px 24px}
.treemap{display:grid;gap:2px;border-radius:8px;overflow:hidden;background:var(--bg)}
.level-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:16px 32px 8px}
.cell{position:relative;min-height:48px;padding:8px 10px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;cursor:pointer;transition:all .2s;border-radius:4px}
.cell:hover{filter:brightness(1.2);transform:scale(1.005);z-index:2}
.cell .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell .size{font-size:11px;opacity:.8;margin-top:2px}
.cell .path{font-size:10px;opacity:0;margin-top:2px;transition:opacity .2s}
.cell:hover .path{opacity:.6}
.detail-panel{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:100;transition:right .3s ease;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.3)}
.detail-panel.open{right:0}
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-header h2{font-size:16px;font-weight:700}
.detail-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.detail-close:hover{background:var(--red);border-color:var(--red)}
.detail-body{padding:20px}
.detail-stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-stat .label{color:var(--muted);font-size:13px}
.detail-stat .value{font-weight:600;font-size:14px}
.detail-list{margin-top:16px}
.detail-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:6px;margin-bottom:4px;background:rgba(255,255,255,.03);transition:background .2s}
.detail-list-item:hover{background:rgba(255,255,255,.07)}
.detail-list-item .left{display:flex;align-items:center;gap:10px;min-width:0}
.detail-list-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.detail-list-item .item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-list-item .item-size{font-size:13px;font-weight:600;flex-shrink:0;margin-left:12px}
.detail-list-item .item-pct{font-size:11px;color:var(--muted);flex-shrink:0;width:48px;text-align:right}
.bar-bg{height:4px;border-radius:2px;background:rgba(255,255,255,.08);width:100%;margin-top:4px}
.bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.section-title{font-size:14px;font-weight:700;color:var(--text);padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:16px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;padding:0 32px;margin-bottom:24px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.summary-card .label{font-size:12px;color:var(--muted);margin-bottom:4px}
.summary-card .value{font-size:24px;font-weight:700}
.summary-card .sub{font-size:12px;color:var(--muted);margin-top:4px}
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{text-align:left;padding:8px 12px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.rank-table td{padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03)}
.rank-table tr:hover td{background:rgba(255,255,255,.03)}
.rank-num{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-right:8px}
.rank-1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000}
.rank-2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.rank-3{background:linear-gradient(135deg,#cd7c2f,#a85c1e);color:#fff}
.rank-n{background:var(--border);color:var(--text)}
.pct-bar{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-left:8px}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:99}
.overlay.show{display:block}
@media(max-width:768px){
  .header{padding:16px}.disk-bar,.treemap-container,.summary-grid,.legend,.controls{padding-left:16px;padding-right:16px}
  .detail-panel{width:100%}.summary-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

// Colors for categories
const COLORS = {
  user_profile: '#3b82f6',
  appdata_local: '#f97316',
  appdata_roaming: '#a855f7',
  temp: '#ef4444',
  downloads: '#ec4899',
  program_files: '#22c55e',
  program_files_x86: '#06b6d4',
  dev_caches: '#eab308'
};
const COLOR_LIST = ['#3b82f6','#f97316','#a855f7','#22c55e','#06b6d4','#ec4899','#eab308','#ef4444','#6366f1','#14b8a6','#f43f5e','#84cc16'];
const GROUP_NAMES = {
  user_profile: '用户目录',
  appdata_local: 'AppData/Local',
  appdata_roaming: 'AppData/Roaming',
  temp: '临时文件',
  downloads: '下载',
  program_files: 'Program Files',
  program_files_x86: 'Program Files (x86)',
  dev_caches: '开发缓存'
};

function parseSize(s) {
  if (!s) return 0;
  const m = s.match(/([\d.]+)\s*(GB|MB|KB|TB)/i);
  if (!m) return 0;
  const n = parseFloat(m[1]);
  const u = m[2].toUpperCase();
  if (u === 'TB') return n * 1024 * 1024;
  if (u === 'GB') return n * 1024;
  if (u === 'MB') return n;
  return n / 1024;
}

function fmtMB(mb) {
  if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
  return mb.toFixed(0) + ' MB';
}

// Flatten all items with group info
let allItems = [];
Object.entries(SCAN.groups).forEach(([group, items]) => {
  items.forEach(item => {
    allItems.push({...item, group, mb: item.size_kb / 1024});
  });
});
allItems.sort((a, b) => b.mb - a.mb);

// Disk bar
function renderDiskBar() {
  const disks = SCAN.system.disks;
  const bar = document.getElementById('diskBar');
  const totalAll = disks.reduce((s, d) => s + parseSize(d.total), 0);
  bar.innerHTML = disks.map((d, i) => {
    const pct = (parseSize(d.total) / totalAll * 100).toFixed(1);
    const usedPct = (parseSize(d.used) / parseSize(d.total) * 100).toFixed(0);
    const colors = ['var(--blue)', 'var(--cyan)', 'var(--purple)'];
    return `<div class="seg" style="width:${pct}%;background:${colors[i]}">
      ${d.name.replace('\\','')}
      <div class="tooltip">${d.name} ${d.used} / ${d.total} (${usedPct}% 已用)</div>
    </div>`;
  }).join('');
}

// Summary cards
function renderSummary() {
  const sys = SCAN.system;
  const cards = [
    {label: 'C盘总容量', value: sys.disk_total, sub: `文件系统: ${sys.filesystem}`, color: 'var(--blue)'},
    {label: '已使用', value: sys.disk_used, sub: `${(parseSize(sys.disk_used)/parseSize(sys.disk_total)*100).toFixed(1)}% 使用率`, color: 'var(--orange)'},
    {label: '剩余可用', value: sys.disk_free, sub: '⚠ 低于 15% 建议清理', color: 'var(--red)'},
    {label: '扫描项目数', value: allItems.length + '', sub: `8 个分组`, color: 'var(--cyan)'},
    {label: '最大单项', value: allItems[0].size_h, sub: allItems[0].name, color: 'var(--purple)'},
    {label: '扫描耗时', value: SCAN.scan_seconds + 's', sub: SCAN.generated_at, color: 'var(--green)'}
  ];
  document.getElementById('summaryCards').innerHTML = cards.map(c => `
    <div class="summary-card" style="border-left:3px solid ${c.color}">
      <div class="label">${c.label}</div>
      <div class="value" style="color:${c.color}">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join('');
}

// Treemap cells
function renderTreemap(groupId, containerId, limit) {
  const items = SCAN.groups[groupId] || [];
  const container = document.getElementById(containerId);
  const color = COLORS[groupId] || '#666';
  const maxMB = items.length ? items[0].mb : 1;
  container.innerHTML = items.slice(0, limit || 20).map((item, i) => {
    const ratio = Math.max(0.3, item.mb / maxMB);
    const opacity = 0.15 + ratio * 0.6;
    return `<div class="cell" style="background:${color};opacity:${opacity}"
      onclick="showDetail('${groupId}',${i})">
      <div class="name" title="${item.name}">${item.name}</div>
      <div class="size">${item.size_h}</div>
      <div class="path">${item.path}</div>
    </div>`;
  }).join('');
}

// Rank view
function renderRank() {
  const top30 = allItems.slice(0, 30);
  const maxMB = top30[0].mb;
  document.getElementById('rankView').innerHTML = `
    <div class="section-title"><span class="icon">🏆</span> C盘占用 Top 30</div>
    <table class="rank-table">
      <thead><tr><th>#</th><th>名称</th><th>位置</th><th>大小</th><th>占比</th></tr></thead>
      <tbody>
      ${top30.map((item, i) => {
        const rank = i < 3 ? `rank-${i+1}` : 'rank-n';
        const pct = (item.mb / 265 / 1024 * 100).toFixed(1);
        const color = COLORS[item.group] || '#666';
        return `<tr onclick="showDetail('${item.group}',${SCAN.groups[item.group].indexOf(item)})" style="cursor:pointer">
          <td><span class="rank-num ${rank}">${i+1}</span></td>
          <td style="font-weight:600">${item.name}</td>
          <td style="color:var(--muted);font-size:12px">${GROUP_NAMES[item.group] || item.group}</td>
          <td style="font-weight:700">${item.size_h}</td>
          <td><span class="pct-bar" style="width:${Math.max(2, pct * 3)}px;background:${color}"></span> ${pct}%</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  `;
}

// Table view
function renderTable() {
  let html = '';
  Object.entries(SCAN.groups).forEach(([group, items]) => {
    const totalMB = items.reduce((s, i) => s + i.mb, 0);
    const color = COLORS[group];
    html += `<div class="section-title"><span class="icon" style="color:${color}">●</span> ${GROUP_NAMES[group] || group} <span style="color:var(--muted);font-weight:400;font-size:12px">(${fmtMB(totalMB)}, ${items.length} 项)</span></div>`;
    html += `<table class="rank-table"><thead><tr><th>名称</th><th>大小</th><th>路径</th></tr></thead><tbody>`;
    items.forEach(item => {
      html += `<tr onclick="showItem('${group}',${items.indexOf(item)})" style="cursor:pointer">
        <td style="font-weight:500">${item.name}</td>
        <td style="font-weight:600">${item.size_h}</td>
        <td style="color:var(--muted);font-size:11px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.path}">${item.path}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  });
  document.getElementById('tableView').innerHTML = html;
}

// Detail panel
function showDetail(group, idx) {
  const item = SCAN.groups[group][idx];
  if (!item) return;
  const panel = document.getElementById('detailPanel');
  const color = COLORS[group];
  document.getElementById('detailTitle').textContent = item.name;

  // Find children by scanning deeper (we only have top-level, so show info)
  const siblings = SCAN.groups[group];
  const totalGroupMB = siblings.reduce((s, i) => s + i.mb, 0);
  const pctOfGroup = (item.mb / totalGroupMB * 100).toFixed(1);
  const pctOfDisk = (item.mb / 265 / 1024 * 100).toFixed(2);

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-stat"><span class="label">大小</span><span class="value" style="color:${color}">${item.size_h}</span></div>
    <div class="detail-stat"><span class="label">路径</span><span class="value" style="font-size:12px;word-break:break-all;max-width:300px">${item.path}</span></div>
    <div class="detail-stat"><span class="label">分组</span><span class="value">${GROUP_NAMES[group] || group}</span></div>
    <div class="detail-stat"><span class="label">占分组比例</span><span class="value">${pctOfGroup}%</span></div>
    <div class="detail-stat"><span class="label">占C盘比例</span><span class="value">${pctOfDisk}%</span></div>
    <div class="bar-bg" style="margin-top:12px"><div class="bar-fill" style="width:${pctOfGroup}%;background:${color}"></div></div>

    <div class="section-title" style="margin-top:24px"><span class="icon">📊</span> 同组对比</div>
    <div class="detail-list">
    ${siblings.slice(0, 10).map((s, i) => `
      <div class="detail-list-item" style="cursor:pointer" onclick="showDetail('${group}',${i})">
        <div class="left">
          <div class="dot" style="background:${i === idx ? color : 'var(--border)'}"></div>
          <span class="item-name" style="${i === idx ? 'font-weight:700' : ''}">${s.name}</span>
        </div>
        <span class="item-size">${s.size_h}</span>
        <span class="item-pct">${(s.mb / totalGroupMB * 100).toFixed(1)}%</span>
      </div>
    `).join('')}
    </div>
  `;

  panel.classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function showItem(group, idx) { showDetail(group, idx); }

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// View switching
function setView(view) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('treemapView').style.display = view === 'treemap' ? '' : 'none';
  document.getElementById('rankView').style.display = view === 'rank' ? '' : 'none';
  document.getElementById('tableView').style.display = view === 'table' ? '' : 'none';
}

// Init
renderDiskBar();
renderSummary();
renderTreemap('user_profile', 'treemapUser', 20);
renderTreemap('appdata_local', 'treemapLocal', 25);
renderTreemap('appdata_roaming', 'treemapRoaming', 25);
renderTreemap('program_files', 'treemapPF', 15);
renderTreemap('program_files_x86', 'treemapPF86', 15);
renderRank();
renderTable();

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
